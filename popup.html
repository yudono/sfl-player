<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: 350px;
      height: auto;
      margin: 0;
      background: #121212;
      color: white;
      overflow: hidden;
    }
    #spotify-floating-lyrics {
      position: relative;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
      backdrop-filter: none;
    }
    .sfl-header {
      cursor: default;
    }
    .sfl-player {
      background: rgba(255, 255, 255, 0.05);
    }
    .sfl-content {
      max-height: 300px;
    }
  </style>
</head>
<body>
  <div id="spotify-floating-lyrics">
    <div class="sfl-header">
      <div class="sfl-title" id="sfl-brand-title">
        <span id="sfl-brand-icon"></span>
        SFL Player
      </div>
      <div class="sfl-controls">
        <button class="sfl-btn" id="sfl-pip-btn" title="Global Floating (Always on Top)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><path d="M13 3v7h8"></path></svg>
        </button>
      </div>
    </div>
    
    <div class="sfl-player">
      <div class="sfl-metadata">
        <img class="sfl-cover" id="sfl-cover" src="placeholder.png" alt="Album Art">
        <div class="sfl-info">
          <div class="sfl-track-title" id="sfl-title">Memuat...</div>
          <div class="sfl-artist-name" id="sfl-artist">SFL Player</div>
        </div>
      </div>
      
      <div class="sfl-playback-controls">
        <button class="sfl-ctrl-btn" id="sfl-prev" title="Previous">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 20L9 12L19 4V20ZM5 20V4H7V20H5Z"/></svg>
        </button>
        <button class="sfl-ctrl-btn sfl-play-pause" id="sfl-play" title="Play/Pause">
          <svg id="sfl-play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 20V4L18 12L7 20Z"/></svg>
        </button>
        <button class="sfl-ctrl-btn" id="sfl-next" title="Next">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4L15 12L5 20V4ZM17 4V20H19V4H17Z"/></svg>
        </button>
        <button class="sfl-ctrl-btn" id="sfl-lyrics-toggle" title="Toggle Lyrics">
          <svg data-encore-id="icon" role="img" aria-hidden="true" class="e-10310-icon" viewBox="0 0 16 16" style="width: 16px; height: 16px;"><path d="M13.426 2.574a2.831 2.831 0 0 0-4.797 1.55l3.247 3.247a2.831 2.831 0 0 0 1.55-4.797M10.5 8.118l-2.619-2.62L4.74 9.075 2.065 12.12a1.287 1.287 0 0 0 1.816 1.816l3.06-2.688 3.56-3.129zM7.12 4.094a4.331 4.331 0 1 1 4.786 4.786l-3.974 3.493-3.06 2.689a2.787 2.787 0 0 1-3.933-3.933l2.676-3.045z" fill="currentColor"></path></svg>
        </button>
      </div>
    </div>

    <div class="sfl-content" id="sfl-content">
      <div class="sfl-empty">
        Hubungkan ke tab aktif untuk melihat lirik atau subtitle.
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
