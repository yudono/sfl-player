<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: 350px;
      height: auto;
      margin: 0;
      background: #121212;
      color: white;
      overflow: hidden;
    }
    #spotify-floating-lyrics {
      position: relative;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
      backdrop-filter: none;
    }
    .sfl-header {
      cursor: default;
    }
    .sfl-player {
      background: rgba(255, 255, 255, 0.05);
    }
    .sfl-content {
      max-height: 300px;
    }
  </style>
</head>
<body>
  <div id="spotify-floating-lyrics">
    <div class="sfl-header">
      <div class="sfl-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#1db954"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.49 17.3c-.22.34-.67.45-1.01.23-2.82-1.72-6.37-2.11-10.55-1.16-.39.09-.78-.17-.87-.56-.09-.39.17-.78.56-.87 4.57-1.04 8.5-.6 11.64 1.32.34.22.45.67.23 1.04zm1.46-3.26c-.28.45-.87.59-1.32.31-3.23-1.99-8.15-2.57-11.97-1.41-.51.15-1.05-.14-1.2-.65-.15-.51.14-1.05.65-1.2 4.36-1.32 9.79-.67 13.52 1.63.45.27.6.86.32 1.32zm.12-3.41c-3.87-2.3-10.26-2.51-13.98-1.38-.6.18-1.23-.17-1.41-.77-.18-.6.17-1.23.77-1.41 4.27-1.3 11.33-1.04 15.8 1.61.54.32.72 1.02.4 1.56-.32.54-1.02.72-1.58.39z"/></svg>
        Spotify Mini Player
      </div>
      <div class="sfl-controls">
        <button class="sfl-btn" id="sfl-pip-btn" title="Global Floating (Always on Top)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><path d="M13 3v7h8"></path></svg>
        </button>
      </div>
    </div>
    
    <div class="sfl-player">
      <div class="sfl-metadata">
        <img class="sfl-cover" id="sfl-cover" src="placeholder.png" alt="Album Art">
        <div class="sfl-info">
          <div class="sfl-track-title" id="sfl-title">Buka Spotify...</div>
          <div class="sfl-artist-name" id="sfl-artist">Artis</div>
        </div>
      </div>
      
      <div class="sfl-playback-controls">
        <button class="sfl-ctrl-btn" id="sfl-prev" title="Previous">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 20L9 12L19 4V20ZM5 20V4H7V20H5Z"/></svg>
        </button>
        <button class="sfl-ctrl-btn sfl-play-pause" id="sfl-play" title="Play/Pause">
          <svg id="sfl-play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 20V4L18 12L7 20Z"/></svg>
        </button>
        <button class="sfl-ctrl-btn" id="sfl-next" title="Next">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4L15 12L5 20V4ZM17 4V20H19V4H17Z"/></svg>
        </button>
      </div>
    </div>

    <div class="sfl-content" id="sfl-content">
      <div class="sfl-empty">
        Hubungkan ke tab Spotify untuk melihat lirik.
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
